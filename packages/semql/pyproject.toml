[project]
name = "semql"
version = "0.1.0"
description = "Pure-Python compiler from a semantic spec to backend SQL — cubes, joins, compare windows, tenancy, RLS. No I/O."
readme = "README.md"
authors = [
    { name = "Nikhil Pallamreddy", email = "nikhil.pallamreddy+git@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.4",
    "sqlglot>=30.9.0",
]

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"
