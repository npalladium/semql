[project]
name = "semql-prompt"
version = "0.1.0"
description = "Stub. Planned: LLM planner / composer that turns natural-language questions into SemanticQuery specs. For now use semql.prompt directly."
readme = "README.md"
authors = [
    { name = "Nikhil Pallamreddy", email = "nikhil.pallamreddy+git@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "semql",
]

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
semql = { workspace = true, editable = true }
