# sops configuration — see https://github.com/getsops/sops
#
# All ``*.enc.yaml`` files in the repo are sops-encrypted with the age
# recipients listed here. Add a recipient (another developer's public
# key) and re-encrypt to grant access:
#
#   sops updatekeys secrets.enc.yaml
#
# Per-developer age keys live in ``~/.config/sops/age/keys.txt`` — never
# checked in. The public key (below) is what gets shared.
creation_rules:
  - path_regex: \.enc\.yaml$
    encrypted_regex: "^(token|.*_token|password|secret)$"
    age: age15hk7hewavcuqk7sjacq6lx8ves8fl3ywf4qpt98prevxxg0jpgyshah9a7
